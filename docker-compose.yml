version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: mmodelx-postgres
    environment:
      POSTGRES_DB: mmodelx
      POSTGRES_USER: mmodelx
      POSTGRES_PASSWORD: mmodelx123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mmodelx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmodelx"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: mmodelx-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mmodelx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: mmodelx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mmodelx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: mmodelx-mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql://mmodelx:mmodelx123@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - minio
    networks:
      - mmodelx-network

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: mmodelx-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - mmodelx-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: mmodelx-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mmodelx-network

  # Prefect（可选）
  prefect:
    image: prefecthq/prefect:2.14.0-python3.11
    container_name: mmodelx-prefect
    command: >
      prefect server start
      --host 0.0.0.0
      --port 4200
    environment:
      PREFECT_API_URL: http://localhost:4200/api
      PREFECT_UI_API_URL: http://localhost:4200/api
    ports:
      - "4200:4200"
    networks:
      - mmodelx-network

networks:
  mmodelx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data: