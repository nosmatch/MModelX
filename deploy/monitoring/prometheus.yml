global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mmodelx'
    environment: 'development'

scrape_configs:
  # MModelX应用监控
  - job_name: 'mmodelx'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # PostgreSQL监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # MinIO监控
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']