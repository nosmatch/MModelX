server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: mmodelx
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mmodelx}
    username: ${DB_USERNAME:mmodelx}
    password: ${DB_PASSWORD:mmodelx123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    encoding: UTF-8
    out-of-order: true

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:mmodelx}
  secure: false

mlflow:
  tracking-uri: ${MLFLOW_TRACKING_URI:http://localhost:5000}
  registry-uri: ${MLFLOW_REGISTRY_URI:http://localhost:5000}
  s3-endpoint-url: ${MLFLOW_S3_ENDPOINT:http://localhost:9002}
  access-key-id: ${MLFLOW_ACCESS_KEY:minioadmin}
  secret-access-key: ${MLFLOW_SECRET_KEY:minioadmin}
  bucket-name: ${MLFLOW_BUCKET:mlflow}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.mogu.data: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mmodelx.log
    max-size: 100MB
    max-history: 30

k8s:
  enabled: ${K8S_ENABLED:true}
  kubeconfig-path: ${K8S_KUBECONFIG_PATH:/tmp/kind-mmodelx-kubeconfig.yaml}
  master-url: ${K8S_MASTER_URL:}
  token: ${K8S_TOKEN:}
  verify-ssl: false

inference:
  image: ${INFERENCE_IMAGE:mmodelx-inference:latest}
  port: ${INFERENCE_PORT:8080}

jwt:
  secret: ${JWT_SECRET:mmodelx-secret-key-for-jwt-token-generation-must-be-long-enough-for-hs512-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}
