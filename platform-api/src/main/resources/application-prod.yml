server:
  port: ${SERVER_PORT:8080}

spring:
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.mogu.data: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

management:
  endpoint:
    health:
      show-details: never

k8s:
  enabled: ${K8S_ENABLED:true}
