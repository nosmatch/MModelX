# Server Configuration
server.port=8089
server.servlet.context-path=/

# Application Configuration
spring.application.name=mmodelx

# Database Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/mmodelx
spring.datasource.username=mmodelx
spring.datasource.password=mmodelx123

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

# MinIO Configuration
minio.endpoint=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucketName=mmodelx

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.root=INFO
logging.level.com.mogu.data=DEBUG